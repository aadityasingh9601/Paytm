name: Build on PR

on:
  pull_request:
    branches:
      - main
env:
  DATABASE_URL: ${{secrets.TEST_DATABASE_URL}}

jobs:
  build:
    name: Runs the E2E tests
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_DB: paytm_test_db
          POSTGRES_PASSWORD: mysecretpassword
        ports:
          - "5432:5432"
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v5

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24.11.1"

      - name: Install dependencies
        run: npm install

      - name: Install PlayWright browsers
        run: npx playwright install --with-deps chromium webkit firefox

      - name: Apply prisma migrations
        run: npm run db:migrate-deploy

      - name: Generate prisma client
        run: npm run db:generate

      - name: Run tests
        run: npx playwright test

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

# We can also add a lint check, formatting check, type check & step to upload the tests result to some place
# in the GitHub repo.
